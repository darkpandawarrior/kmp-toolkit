<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kmp-network — shared Ktor HTTP plumbing for Kotlin Multiplatform">
  <defs>
    <linearGradient id="kn-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#087CFA"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <text x="450" y="62" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="url(#kn-grad)">
    kmp-network
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0s" fill="freeze"/>
  </text>

  <!-- client / server, request travels out, response travels back. Boxes + labels sit at y 94-124
       (label baseline y=109, box vertical center); the packets travel the open span between the
       boxes only (x 165-735), stopping short of each box's edge so an arriving packet never
       overlaps the "client"/"server" text itself. -->
  <rect x="100" y="94" width="46" height="30" rx="5" fill="none" stroke="#087CFA" stroke-width="2"/>
  <text x="123" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#087CFA">client</text>

  <rect x="754" y="94" width="46" height="30" rx="5" fill="none" stroke="#14B8A6" stroke-width="2"/>
  <text x="777" y="113" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#14B8A6">server</text>

  <line x1="146" y1="109" x2="754" y2="109" stroke="url(#kn-grad)" stroke-width="2" opacity="0.3"/>

  <!-- request packet: client -> server -->
  <rect width="10" height="10" fill="#087CFA" rx="2">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M 165 104 L 735 104" keyPoints="0;1" keyTimes="0;0.4" calcMode="linear"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.4;0.42;1" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <!-- response packet: server -> client -->
  <rect width="10" height="10" fill="#14B8A6" rx="2">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M 735 116 L 165 116" keyPoints="0;1" keyTimes="0;1" begin="1.2s" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.46;0.5;0.9;1" dur="2.6s" begin="0s" repeatCount="indefinite"/>
  </rect>

  <!-- retry / timeout ring pulsing at the client while waiting -->
  <circle cx="123" cy="109" r="30" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="18;30" keyTimes="0;1" dur="0.9s" begin="0.9s;3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" keyTimes="0;1" dur="0.9s" begin="0.9s;3.5s" repeatCount="indefinite"/>
  </circle>

  <text x="450" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="2" fill="#94a3b8">
    ONE CLIENT FACTORY — RETRY, TIMEOUT, 401 HANDLED ONCE
  </text>
</svg>

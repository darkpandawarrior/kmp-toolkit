<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ksecu-title ksecu-desc">
  <title id="ksecu-title">kmp-security</title>
  <desc id="ksecu-desc">Android app-hardening and VAPT posture toolkit — a locked keystore and a shield deflecting a threat probe.</desc>
  <defs>
    <linearGradient id="ks-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <text x="450" y="56" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="url(#ks-grad)">kmp-security</text>

  <g transform="translate(450,96)">
    <path d="M 0,-18 L 15,-12 L 15,3 C 15,14 8,22 0,26 C -8,22 -15,14 -15,3 L -15,-12 Z"
          fill="none" stroke="url(#ks-grad)" stroke-width="2.5"/>
    <path d="M -6,3 L -2,8 L 8,-6" fill="none" stroke="url(#ks-grad)" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(300,96)">
    <rect x="-11" y="-2" width="22" height="17" rx="3" fill="none" stroke="#0D9488" stroke-width="2.5"/>
    <path d="M -6,-2 L -6,-9 C -6,-16 6,-16 6,-9 L 6,-2" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="6" r="2" fill="#0D9488"/>
  </g>

  <!-- threat deflected before reaching the shield -->
  <circle cx="500" cy="96" r="4.5" fill="#EF4444" opacity="0.6"/>
  <path d="M 494,90 L 506,90 M 500,84 L 500,96" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>

  <text x="450" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="2" fill="#94a3b8">HEURISTICS RAISE THE COST — THE KEYSTORE HOLDS THE LINE</text>
</svg>

<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kmp-security — Android app-hardening and VAPT posture toolkit">
  <defs>
    <linearGradient id="ks-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <text x="450" y="56" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="url(#ks-grad)">kmp-security</text>

  <!-- shield pulses center stage; motif band kept to y 76-118, clear of the tagline at y=156 -->
  <g transform="translate(450,96)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1.07;1" dur="1.8s" repeatCount="indefinite"/>
      <path d="M 0,-18 L 15,-12 L 15,3 C 15,14 8,22 0,26 C -8,22 -15,14 -15,3 L -15,-12 Z"
            fill="none" stroke="url(#ks-grad)" stroke-width="2.5"/>
      <path d="M -6,3 L -2,8 L 8,-6" fill="none" stroke="url(#ks-grad)" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    </g>
  </g>

  <!-- lock closes shut just left of the shield -->
  <g transform="translate(300,96)">
    <rect x="-11" y="-2" width="22" height="17" rx="3" fill="none" stroke="#0D9488" stroke-width="2.5"/>
    <path d="M -6,-2 L -6,-9 C -6,-16 6,-16 6,-9 L 6,-2" fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="-22 0 -2;0 0 -2;0 0 -2;-22 0 -2" keyTimes="0;0.25;0.85;1" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="6" r="2" fill="#0D9488"/>
  </g>

  <!-- threat probe: approaches from the right, gets deflected before reaching the shield -->
  <circle r="4.5" fill="#EF4444">
    <animateMotion dur="2.4s" repeatCount="indefinite" path="M 640 96 L 500 96 L 472 82"/>
    <animate attributeName="opacity" values="1;1;1;0" keyTimes="0;0.55;0.62;0.7" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <path d="M 494,90 L 506,90 M 500,84 L 500,96" stroke="#EF4444" stroke-width="2" opacity="0" stroke-linecap="round">
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.52;0.58;0.68" dur="2.4s" repeatCount="indefinite"/>
  </path>

  <text x="450" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="2" fill="#94a3b8">HEURISTICS RAISE THE COST — THE KEYSTORE HOLDS THE LINE</text>
</svg>

<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="kt-title kt-desc">
  <title id="kt-title">kmp-toolkit</title>
  <desc id="kt-desc">A family of small, focused Kotlin Multiplatform libraries — module nodes connected into one dependency graph, no module dragging in its siblings.</desc>
  <defs>
    <linearGradient id="kt-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F52FF"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="kt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="898" height="168" rx="16" fill="url(#kt-bg)" stroke="#30363d" stroke-width="1"/>

  <text x="450" y="76" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#kt-grad)">kmp-toolkit</text>

  <!-- module nodes assembled into a connected graph -->
  <g id="kt-links" stroke="url(#kt-grad)" stroke-width="1.6" opacity="0.5">
    <line x1="255" y1="115" x2="345" y2="102"/>
    <line x1="345" y1="102" x2="450" y2="120"/>
    <line x1="450" y1="120" x2="555" y2="102"/>
    <line x1="555" y1="102" x2="645" y2="115"/>
    <line x1="345" y1="102" x2="450" y2="132"/>
    <line x1="555" y1="102" x2="450" y2="132"/>
  </g>

  <g id="kt-nodes-a" fill="url(#kt-grad)">
    <circle cx="255" cy="115" r="5"/>
    <circle cx="345" cy="102" r="5"/>
    <circle cx="450" cy="120" r="6.5"/>
  </g>
  <g id="kt-nodes-b" fill="url(#kt-grad)">
    <circle cx="450" cy="132" r="4"/>
    <circle cx="555" cy="102" r="5"/>
    <circle cx="645" cy="115" r="5"/>
  </g>

  <text x="450" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="3" fill="#94a3b8">
    36 FOCUSED KOTLIN MULTIPLATFORM MODULES, ONE MONOREPO
  </text>
</svg>

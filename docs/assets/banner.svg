<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kmp-toolkit — a family of small, focused Kotlin Multiplatform libraries">
  <defs>
    <linearGradient id="kt-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F52FF"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <text x="450" y="76" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#kt-grad)">kmp-toolkit</text>

  <!-- animated middle band: small module nodes assembling into a connected graph, y 96-134,
       clear of the title's descender (ends ~80) and the tagline's ascender (starts ~150) -->
  <g stroke="url(#kt-grad)" stroke-width="1.6" opacity="0.55">
    <line x1="255" y1="115" x2="345" y2="102">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.6s" repeatCount="indefinite" begin="0s"/>
    </line>
    <line x1="345" y1="102" x2="450" y2="120">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.6s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="450" y1="120" x2="555" y2="102">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
    </line>
    <line x1="555" y1="102" x2="645" y2="115">
      <animate attributeName="opacity" values="0.15;0.7;0.15" dur="2.6s" repeatCount="indefinite" begin="0.9s"/>
    </line>
    <line x1="345" y1="102" x2="450" y2="132">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.6s" repeatCount="indefinite" begin="1.1s"/>
    </line>
    <line x1="555" y1="102" x2="450" y2="132">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.6s" repeatCount="indefinite" begin="1.4s"/>
    </line>
  </g>

  <g fill="url(#kt-grad)">
    <circle cx="255" cy="115" r="5">
      <animate attributeName="r" values="4;6;4" dur="2.6s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="345" cy="102" r="5">
      <animate attributeName="r" values="4;6;4" dur="2.6s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="450" cy="120" r="6.5">
      <animate attributeName="r" values="5.5;7.5;5.5" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="450" cy="132" r="4">
      <animate attributeName="r" values="3;5;3" dur="2.6s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
    <circle cx="555" cy="102" r="5">
      <animate attributeName="r" values="4;6;4" dur="2.6s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="645" cy="115" r="5">
      <animate attributeName="r" values="4;6;4" dur="2.6s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>

  <text x="450" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="3" fill="#94a3b8">
    36 FOCUSED KOTLIN MULTIPLATFORM MODULES, ONE MONOREPO
  </text>
</svg>

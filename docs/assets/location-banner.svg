<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kmp-toolkit location — GPS track-processing math for Kotlin Multiplatform">
  <defs>
    <linearGradient id="loc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <text x="450" y="70" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="url(#loc-grad)">
    location
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0s" fill="freeze"/>
  </text>

  <!-- a jagged raw GPS track (dashed) that a smoothed Kalman line traces cleanly through -->
  <polyline points="150,120 200,104 240,132 290,108 340,128 390,106 440,130 500,110 560,126 620,108 680,122 750,114"
            fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>
  <path d="M 150 118 Q 270 112 390 116 T 620 114 T 750 115" fill="none" stroke="url(#loc-grad)" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="700" stroke-dashoffset="700">
    <animate attributeName="stroke-dashoffset" values="700;0" dur="2.6s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <circle r="5" fill="#22C55E">
    <animateMotion dur="2.6s" begin="0.4s" repeatCount="indefinite" path="M 150 118 Q 270 112 390 116 T 620 114 T 750 115"/>
  </circle>
</svg>

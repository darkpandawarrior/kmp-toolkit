<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kmp-secrets — SOPS and age encrypted secrets vault">
  <defs>
    <linearGradient id="ksec-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <text x="450" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="url(#ksec-grad)">kmp-secrets</text>

  <!-- plaintext token, top-left, shimmers then dissolves into ciphertext dots that travel to the vault -->
  <text x="150" y="122" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" fill="#94a3b8">
    api_key: sk-live-***
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.4;0.5" dur="2.6s" repeatCount="indefinite"/>
  </text>

  <g>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.48;0.9;1" dur="2.6s" repeatCount="indefinite"/>
    <circle cx="160" cy="118" r="3" fill="#D97706"><animateMotion dur="1.6s" begin="1.05s" repeatCount="indefinite" path="M 0 0 L 460 -10"/></circle>
    <circle cx="185" cy="118" r="3" fill="#D97706"><animateMotion dur="1.6s" begin="1.12s" repeatCount="indefinite" path="M 0 0 L 435 -10"/></circle>
    <circle cx="210" cy="118" r="3" fill="#D97706"><animateMotion dur="1.6s" begin="1.19s" repeatCount="indefinite" path="M 0 0 L 410 -10"/></circle>
    <circle cx="235" cy="118" r="3" fill="#D97706"><animateMotion dur="1.6s" begin="1.26s" repeatCount="indefinite" path="M 0 0 L 385 -10"/></circle>
  </g>

  <!-- the vault door, right side: bolt slides across on ciphertext arrival -->
  <g transform="translate(720,112)">
    <rect x="-26" y="-20" width="52" height="52" rx="6" fill="none" stroke="url(#ksec-grad)" stroke-width="2.5"/>
    <circle cx="0" cy="6" r="7" fill="none" stroke="url(#ksec-grad)" stroke-width="2.5"/>
    <line x1="0" y1="6" x2="0" y2="-2" stroke="url(#ksec-grad)" stroke-width="2.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="0 0 6;340 0 6;0 0 6" keyTimes="0;0.5;1" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <rect x="-33" y="4" width="8" height="5" fill="url(#ksec-grad)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.48;0.55;0.9;1" dur="2.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="450" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="2" fill="#94a3b8">
    ALIAS &#8594; VAULT &#8594; SOPS+AGE DECRYPT &#8594; MATERIALIZE
  </text>
</svg>

<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ksec2-title ksec2-desc">
  <title id="ksec2-title">kmp-secrets</title>
  <desc id="ksec2-desc">SOPS and age encrypted secrets vault — a plaintext key dissolving into ciphertext, a bolt locking the vault shut.</desc>
  <defs>
    <linearGradient id="ksec-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <text x="450" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="url(#ksec-grad)">kmp-secrets</text>

  <text x="150" y="122" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" fill="#94a3b8" opacity="0.5">
    api_key: sk-live-***
  </text>

  <g fill="#D97706">
    <circle cx="330" cy="112" r="3"/>
    <circle cx="355" cy="110" r="3"/>
    <circle cx="380" cy="108" r="3"/>
    <circle cx="405" cy="106" r="3"/>
  </g>

  <!-- vault door, locked -->
  <g transform="translate(720,112)">
    <rect x="-26" y="-20" width="52" height="52" rx="6" fill="none" stroke="url(#ksec-grad)" stroke-width="2.5"/>
    <circle cx="0" cy="6" r="7" fill="none" stroke="url(#ksec-grad)" stroke-width="2.5"/>
    <line x1="0" y1="6" x2="0" y2="-2" stroke="url(#ksec-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-33" y="4" width="8" height="5" fill="url(#ksec-grad)"/>
  </g>

  <text x="450" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" letter-spacing="2" fill="#94a3b8">
    ALIAS &#8594; VAULT &#8594; SOPS+AGE DECRYPT &#8594; MATERIALIZE
  </text>
</svg>

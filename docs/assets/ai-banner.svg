<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="kai-title kai-desc">
  <title id="kai-title">kmp-ai</title>
  <desc id="kai-desc">On-device LLM abstraction for Kotlin Multiplatform — a prompt falling through fallback tiers: ML Kit, then MediaPipe, then a heuristic.</desc>
  <defs>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <text x="450" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#ai-grad)">kmp-ai</text>

  <text x="150" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">prompt</text>
  <circle cx="320" cy="140" r="5" fill="#059669"/>

  <g font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">
    <rect x="300" y="96" width="70" height="26" rx="6" fill="none" stroke="#059669" stroke-width="2"/>
    <text x="335" y="113" fill="#059669">ML Kit</text>

    <rect x="450" y="96" width="80" height="26" rx="6" fill="none" stroke="#6D28D9" stroke-width="2" opacity="0.55"/>
    <text x="490" y="113" fill="#6D28D9" opacity="0.55">MediaPipe</text>

    <rect x="610" y="96" width="80" height="26" rx="6" fill="none" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4 3" opacity="0.4"/>
    <text x="650" y="113" fill="#7C3AED" opacity="0.4">heuristic</text>
  </g>

  <text x="770" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">text ↩</text>
</svg>

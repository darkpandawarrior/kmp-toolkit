name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build + test all modules
        run: ./gradlew assemble jvmTest testAndroidHostTest testDebugUnitTest --stacktrace

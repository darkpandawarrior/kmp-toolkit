name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kmp-toolkit
    steps:
      - uses: actions/checkout@v4
        with:
          path: kmp-toolkit
      # settings.gradle.kts does includeBuild("../kmp-build-logic") — check out the sibling repo
      - uses: actions/checkout@v4
        with:
          repository: darkpandawarrior/kmp-build-logic
          path: kmp-build-logic
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build + test all modules
        run: ./gradlew assemble jvmTest testAndroidHostTest testDebugUnitTest --stacktrace

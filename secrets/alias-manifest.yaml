# alias-manifest.yaml — logical secret name -> vault entry -> materialize target
# =============================================================================
# Modeled on kmp-project-template's secrets-manifest.yaml + secrets/LAYOUT.yaml.
#
# Resolution (one-way, same shape as the template's framework):
#   alias -> vault_key (path inside the encrypted vault file)
#         -> sops -d (age decrypt)
#         -> materialize.at  (where the plaintext value/file lands on disk)
#
# GENERATED-BY-HAND for this demo repo (the template regenerates its version
# with scripts/secrets/generate-manifest.sh from per-platform secrets-needs.yaml
# files; this standalone vault has no such downstream, so it's maintained
# directly).
# =============================================================================
schema_version: "1.0"
vault: vault/example.secrets.enc.yaml

aliases:
  - alias: demo_api_key
    vault_key: services.demo_api.api_key
    materialize: { at: "out/_env/DEMO_API_KEY", mode: env-line, env_var: DEMO_API_KEY }

  - alias: demo_db_password
    vault_key: services.demo_db.password
    materialize: { at: "out/_env/DEMO_DB_PASSWORD", mode: env-line, env_var: DEMO_DB_PASSWORD }

  - alias: demo_signing_cert
    vault_key: services.demo_signing.cert_p12_base64
    materialize: { at: "out/certs/demo_signing.p12", mode: file, permissions: "0600" }

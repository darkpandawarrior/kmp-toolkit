# .sops.yaml — encryption rules for this vault.
#
# Any file under vault/ matching *.enc.yaml gets encrypted to the age
# recipient(s) below. Modeled on kmp-project-template's Path B vault mode
# (deployment/BOOTSTRAP.md, docs/claude/secrets-management.md).
#
# The recipient below is a PLACEHOLDER — it is not a real age key (age was
# not installed when this repo was populated, so none was generated). Replace
# it with your own before encrypting anything real:
#
#   age-keygen -o ~/.config/sops/age/keys.txt
#   grep '^# public key:' ~/.config/sops/age/keys.txt
#
creation_rules:
  - path_regex: vault/.*\.enc\.ya?ml$
    age: age1PLACEHOLDER0000000000000000000000000000000000000000000000
